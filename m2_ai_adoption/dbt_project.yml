# Name your project! Project names should contain only lowercase characters
# and underscores. A good package name should reflect your organization's
# name or the intended use of these models
name: 'm2_ai_adoption'
version: '1.0.0'
config-version: 2

# This setting configures which "profile" dbt uses for this project.
profile: 'm2_ai_adoption'

# These configurations specify where dbt should look for different types of files.
# The `model-paths` config, for example, states that models in this project can be
# found in the "models/" directory. You probably won't need to change these!
model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

clean-targets: # directories to be removed by `dbt clean`
  - "target"
  - "dbt_packages"

# Configuring models
# Full documentation: https://docs.getdbt.com/docs/configuring-models

models:
  # Project-level configs (apply to all models unless overridden)
  m2_ai_adoption:
    +materialized: view  # Default: all models as views
    +schema: default_dataset  # BigQuery dataset name

    # Folder-specific configs (e.g., for models/ subfolders)
    staging:
      +materialized: table
      +schema: staging_dataset  # Separate dataset for staging tables
      +tags: ["staging"]  # Optional: add tags for organization/filtering

    intermediate:
      +materialized: table
      +schema: intermediate_dataset
      +tags: ["intermediate"]

    marts:
      +materialized: table
      +schema: analytics_dataset  # Final dataset for business logic
      +tags: ["mart"]

    star:
      +materialized: table
      +schema: star
      +tags: ["star"]
